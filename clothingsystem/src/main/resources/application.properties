spring.application.name=clothingsystem
# 1. Định danh ứng dụng

# 2. Cấu hình kết nối MySQL (Đã đổi tên db thành clothingshop)
spring.datasource.url=jdbc:mysql://localhost:3306/clothingshop
spring.datasource.username=root
# [CAUTION] Mật khẩu MySQL '123456' rất yếu. Hãy đổi mật khẩu mạnh hơn (ví dụ: 'StrongP@ssw0rd!')
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# 3. Cấu hình Hibernate để tự động tạo bảng
# Khi bạn chạy project, Spring sẽ tự tạo bảng dựa trên các file trong folder 'entity'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. Cổng chạy Server (Mặc định 8080)
server.port=8080

# 5. Email Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 6. OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.scope=public_profile, email
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.facebook.client-name=Facebook

# Cấu hình giới hạn file upload (Thêm vào file cũ của bạn)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

